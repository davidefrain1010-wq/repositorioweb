<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de edad para votar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ejercicio13.css">
    <script src="js/ejercicio13.js" defer></script>
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Dime tu edad y te diré si puedes votar</h1>
        <p class="subtitulo">Dime tu edad</p>
        <div class="grupo-formulario">
            <label for="edad">Tu edad aquí :^</label>
            <input type="number" id="edad" placeholder="Ejemplo: 20">
        </div>
        <button id="btnVerificar" class="boton-enviar">Verificar</button>
        <div class="grupo-formulario">
            <label for="resultado">Resultado</label>
            <input type="text" id="resultado" readonly placeholder="Aquí te diré si puedes votar :p">
        </div>
        <p id="mensajeError" class="mensaje-error"></p>
    </div>
</body>
</html>
