<html lang="es">

    <link rel="stylesheet" href="css/ejercicio18.css">

<body>
    <div class="contenedor-formulario">
        <h1>Agregar y eliminar elementos</h1>

        <div class="grupo-formulario">

            </ul>
        </div>
