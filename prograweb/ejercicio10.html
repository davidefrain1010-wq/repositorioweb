<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Celsius a Fahrenheit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ejercicio10.css">
    <script src="js/ejercicio10.js" defer></script>
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Conversor de Temperatura</h1>
        <p class="subtitulo">Convierte grados Celsius a Fahrenheit fácilmente</p>
        <div class="grupo-formulario">
            <label for="celsius">Grados Celsius (°C)</label>
            <input type="number" id="celsius" placeholder="Ejemplo: 25">
        </div>
        <button id="btnConvertir" class="boton-enviar">Convertir</button>
        <div class="grupo-formulario">
            <label for="fahrenheit">Grados Fahrenheit (°F)</label>
            <input type="text" id="fahrenheit" readonly placeholder="Resultado">
        </div>
        <p id="mensajeError" class="mensaje-error"></p>
    </div>
</body>
</html>
